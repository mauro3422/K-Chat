use_default_settings: true

general:
  instance_name: "Kairos Search"
  debug: false
  enable_metrics: false

search:
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "127.0.0.1"
  limiter: true
  public_instance: false
  # Can also be set via SEARXNG_SECRET_KEY env var (takes precedence)
  # Fallback key: c6bac04a5a42f9bf4a2e8d7a2e375a2d9cf65788a5f8368ef1af4c5c3574ee61
  secret_key: "$__env__SEARXNG_SECRET_KEY"
  method: "GET"
  image_proxy: false

valkey:
  url: false

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
