[pytest]
asyncio_mode = auto
markers =
    unit: Pruebas unitarias rápidas (mocked, sin DB real)
    integration: Pruebas de integración (DB real, HTTP server)
testpaths = tests/unit tests/integration
filterwarnings =
    ignore:aifc was removed in Python 3.13:DeprecationWarning:speech_recognition
addopts = -n auto --dist=worksteal --cov=src --cov-report=term-missing --cov-report=html:test-results/coverage
