<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<link rel="stylesheet" href="/static/style.css?v=9">
<script src="/static/marked.min.js?v=7"></script>
<script src="/static/purify.min.js?v=7"></script>
</head><body>
<div id="app">
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="brand-container">
      <img src="/static/logo.png" alt="Kairos Logo" class="brand-logo">
      <h2>Kairos</h2>
    </div>
    <select id="model-select" class="model-select">
      {% for m in models %}
        <option value="{{ m.id }}" title="{{ m.label }}">{{ m.label }}</option>
      {% endfor %}
    </select>
    <a href="/" class="btn-new">+ Nueva</a>
  </div>
  <div id="session-list"
       hx-get="/sidebar?current={{ session_id }}"
       hx-trigger="load delay:0.1s"
       hx-swap="innerHTML"></div>
</aside>
<main id="main">
  <div class="main-header">
    <span class="debug-toggle" id="debug-toggle">&#128202; Debug</span>
  </div>
  <div id="messages"><div class="empty-state">Envia un mensaje para empezar</div></div>
  <form id="chat-form">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Escribe un mensaje..." autofocus rows="1"></textarea>
      <button type="button" id="asr-mic-btn" class="asr-mic-idle" title="Grabar voz (Speech-to-Text)">🎤</button>
      <button type="submit">Enviar</button>
    </div>
    <span id="spinner" class="htmx-indicator"></span>
  </form>
<div id="debug-panel" class="debug-panel">
  <div class="debug-header">
    <h3>Debug</h3>
    <span class="debug-close" id="debug-close">&times;</span>
  </div>
  <div id="debug-content" class="debug-body">Envia un mensaje para ver el debug</div>
</div>
</div>
<script>
// sessionId is set by SessionContext.init below; model selection is handled in session.js
</script>
<script type="module">
  import { SessionContext } from '/static/modules/session-context.js';
  SessionContext.init("{{ session_id }}");
</script>
<script type="module" src="/static/session.js?v=10"></script>
<script type="module" src="/static/modules/utils.js?v=2"></script>
<script type="module" src="/static/modules/widgets/core.js?v=2"></script>
<script type="module" src="/static/modules/widgets/ui-helpers.js?v=2"></script>
<script type="module" src="/static/modules/widgets/iframe-builder.js?v=2"></script>
<script type="module" src="/static/modules/widgets/toolbar-core.js?v=2"></script>
<script type="module" src="/static/modules/widgets/toolbar-editor.js?v=2"></script>
<script type="module" src="/static/modules/widgets/toolbar-history.js?v=2"></script>
<script type="module" src="/static/modules/widgets/toolbar.js?v=2"></script>
<script type="module" src="/static/modules/widgets/iframe.js?v=2"></script>
<script type="module" src="/static/modules/widgets/messaging.js?v=2"></script>
<script type="module" src="/static/modules/widgets/bootstrap.js?v=3"></script>
<script type="module" src="/static/modules/markdown-renderer.js?v=9"></script>
<script type="module" src="/static/modules/stream-dispatcher.js?v=7"></script>
<script type="module" src="/static/modules/reasoning-handler.js?v=2"></script>
<script type="module" src="/static/modules/content-handler.js?v=2"></script>
<script type="module" src="/static/modules/tool-call-renderer.js?v=2"></script>
<script type="module" src="/static/modules/chat-form-bootstrap.js?v=1"></script>
<script type="module" src="/static/modules/asr-mic.js?v=1"></script>
<style>
.input-row { display: flex; gap: 6px; align-items: flex-start; width: 100%; }
.input-row #msg-input {
  flex: 1; resize: none; overflow-y: auto; min-height: 42px; max-height: 200px;
  font-family: inherit; font-size: inherit; padding: 10px 12px; border-radius: 8px;
  border: 1px solid #555; background: #1a1a2e; color: #eee; box-sizing: border-box;
  line-height: 1.4;
}
.input-row #msg-input:focus { outline: none; border-color: #58a6ff; }
#asr-mic-btn {
  background: none; border: 1px solid #555; border-radius: 8px;
  cursor: pointer; font-size: 1.3em; padding: 4px 10px;
  transition: all 0.2s; line-height: 1; margin-top: 6px;
}
#asr-mic-btn:hover { background: #333; border-color: #888; }
.asr-mic-recording { animation: asr-pulse 1s infinite; border-color: #f44 !important; background: #3a1111 !important; }
.asr-mic-transcribing { opacity: 0.6; cursor: wait !important; }
@keyframes asr-pulse { 0%,100% { box-shadow: 0 0 0 0 #f44; } 50% { box-shadow: 0 0 8px 2px #f44; } }
</style>
<script type="module" src="/static/debug.js?v=14"></script>
<script type="module" src="/static/modules/stream-bootstrap.js?v=1"></script>
<script type="module" src="/static/modules/stream-orchestrator.js?v=3"></script>
<script type="module" src="/static/modules/chat-form-bootstrap.js?v=1"></script>
</body></html>
