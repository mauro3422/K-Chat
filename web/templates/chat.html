<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<script src="/static/htmx.min.js"></script>
<link rel="stylesheet" href="/static/style.css?v=11">
<script src="/static/marked.min.js?v=7"></script>
<script src="/static/purify.min.js?v=7"></script>
</head><body>
<div id="app" data-session-id="{{ session_id }}">
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="brand-container">
      <img src="/static/logo.png" alt="Kairos Logo" class="brand-logo">
      <h2>Kairos</h2>
    </div>
    <a href="/?new=1" class="btn-new">+ Nueva</a>
  </div>
  <div id="session-list"
       hx-get="/sidebar?current={{ session_id }}"
       hx-trigger="load delay:0.1s"
       hx-swap="innerHTML"></div>
  <!-- Skills Section -->
  <div class="skills-sidebar-section">
    <div class="skills-header" id="skills-sidebar-header">
      <span class="skills-icon">💡</span>
      <h4>Skills</h4>
    </div>
    <div class="skills-list" id="skills-sidebar-list">
      <!-- Cargar dinámicamente -->
    </div>
  </div>
</aside>
<div id="sidebar-gutter" class="sidebar-gutter"></div>
<main id="main">
  <div class="main-header">
    <button id="canvas-toggle" class="canvas-toggle-btn" title="Ver Lienzo">🎨 Lienzo</button>
    <button id="theme-toggle" class="theme-toggle-btn" title="Cambiar tema">🌓</button>
    <span class="debug-toggle" id="debug-toggle">&#128202; Debug</span>
  </div>
  <div id="messages"><div class="empty-state">Envia un mensaje para empezar</div></div>
  <form id="chat-form">
    <div class="chat-input-container">
      <textarea id="msg-input" placeholder="Escribe un mensaje..." autofocus rows="1"></textarea>
      <div id="attach-preview" class="attach-preview"></div>
      <div class="chat-input-toolbar">
        <div class="toolbar-left">
          <div class="model-select-wrapper">
            <span class="robot-icon" title="Modelos">🤖</span>
            <select id="model-select" class="model-select">
              {% for group_name, group_models in models.items() %}
                {% if group_models %}
                  {% set group_labels = {"go_premium": "🚀 GO Premium", "go_standard": "⚡ GO Standard", "go_economy": "💰 GO Económico", "free_ratelimited": "⚠️ Free (Rate Limited)", "zen": "🔵 Zen"} %}
                  <optgroup label="{{ group_labels.get(group_name, group_name) }}">
                    {% for m in group_models %}
                      <option value="{{ m.id }}" class="model-option-{{ m.tier }}" title="{{ m.label }}">{{ m.label }}</option>
                    {% endfor %}
                  </optgroup>
                {% endif %}
              {% endfor %}
            </select>
          </div>
          <button type="button" id="asr-mic-btn" class="asr-mic-idle" title="Grabar voz (Speech-to-Text)">
            <svg class="mic-svg" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button type="button" id="attach-btn" class="attach-btn" title="Adjuntar archivos">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </button>
          <input type="file" id="file-input" multiple accept="image/*,application/pdf,audio/*,*/*" style="display:none">
        </div>
        <div class="toolbar-right">
          <button type="submit" id="chat-submit-btn" title="Enviar mensaje">
            <svg class="send-svg" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <span id="spinner" class="htmx-indicator"></span>
  </form>
  </main>
  <div id="canvas-gutter" class="canvas-gutter"></div>
  <div id="canvas-workspace" class="canvas-workspace">
    <div class="canvas-header">
      <div class="canvas-title-wrapper">
        <span class="canvas-icon">🎨</span>
        <h3>Lienzo</h3>
      </div>
      <button id="canvas-close" class="canvas-close" title="Ocultar Lienzo">&times;</button>
    </div>
    <div id="canvas-cards" class="canvas-cards-container"></div>
  </div>
<div id="debug-panel" class="debug-panel">
  <div class="debug-header">
    <h3>Debug</h3>
    <span class="debug-close" id="debug-close">&times;</span>
  </div>
  <div id="debug-content" class="debug-body">Envia un mensaje para ver el debug</div>
</div>
</div>
<script type="module" src="/static/dist/assets/app.js"></script>
<script>
// Model availability checker — live status dots
(async function() {
  try {
    var res = await fetch('/models/availability');
    if (!res.ok) return;
    var data = await res.json();
    if (!data.models) return;
    var select = document.getElementById('model-select');
    if (!select) return;
    var limitedCount = data.limited_count || 0;

    for (var i = 0; i < select.options.length; i++) {
      var opt = select.options[i];
      var info = data.models[opt.value];
      if (!info) continue;

      // Remove old status prefix
      var clean = opt.textContent.replace(/^[🔴🟢⚪]?\s*/, '');
      // Remove cooldown badge if any
      clean = clean.replace(/\s+🔒\s*\d+s$/, '');

      if (info.status === 'rate_limited') {
        var cd = info.cooldown_remaining || 0;
        opt.textContent = '🔴 ' + clean + '  🔒 ' + Math.round(cd) + 's';
        opt.style.opacity = '0.5';
      } else if (info.status === 'unknown') {
        opt.textContent = '⚪ ' + clean;
        opt.style.opacity = '0.85';
      }
    }

    if (limitedCount > 0) {
      var mic = document.getElementById('asr-mic-btn');
      if (mic && !document.getElementById('rl-badge')) {
        var badge = document.createElement('span');
        badge.id = 'rl-badge';
        badge.textContent = '⚠️ ' + limitedCount;
        badge.title = limitedCount + ' modelo(s) rate-limited';
        badge.style.cssText = 'font-size:10px;color:var(--accent-red);margin-left:4px;cursor:pointer;';
        badge.onclick = function() {
          var d = document.getElementById('debug-panel');
          if (d) d.style.display = d.style.display === 'none' ? 'flex' : 'none';
        };
        select.parentNode.appendChild(badge);
      }
    }

    // Refresh every 30s
    setTimeout(arguments.callee, 30000);
  } catch(e) { /* silently retry */ setTimeout(arguments.callee, 60000); }
})();
</script>
</body></html>
