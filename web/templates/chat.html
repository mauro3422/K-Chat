<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<link rel="stylesheet" href="/static/style.css?v=9">
<script src="/static/marked.min.js?v=7"></script>
<script src="/static/purify.min.js?v=7"></script>
</head><body>
<div id="app">
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="brand-container">
      <img src="/static/logo.png" alt="Kairos Logo" class="brand-logo">
      <h2>Kairos</h2>
    </div>
    <select id="model-select" class="model-select" onchange="defaultModel=this.value; localStorage.setItem('selected_model', this.value)">
      {% for m in models %}
        <option value="{{ m }}">{{ m }}</option>
      {% endfor %}
    </select>
    <a href="/" class="btn-new">+ Nueva</a>
  </div>
  <div id="session-list"
       hx-get="/sidebar?current={{ session_id }}"
       hx-trigger="load delay:0.1s"
       hx-swap="innerHTML"></div>
</aside>
<main id="main">
  <div class="main-header">
    <span class="debug-toggle" onclick="toggleDebug()">&#128202; Debug</span>
  </div>
  <div id="messages"><div class="empty-state">Envia un mensaje para empezar</div></div>
  <form id="chat-form">
    <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autofocus>
    <button type="submit">Enviar</button>
    <span id="spinner" class="htmx-indicator"></span>
  </form>
</main>
<div id="debug-panel" class="debug-panel">
  <div class="debug-header">
    <h3>Debug</h3>
    <span class="debug-close" onclick="toggleDebug()">&times;</span>
  </div>
  <div id="debug-content" class="debug-body">Envia un mensaje para ver el debug</div>
</div>
</div>
<script>
var sessionId = "{{ session_id }}";
var defaultModel = "{{ model }}";
// Recuperar el modelo guardado del usuario en localStorage
if (localStorage.getItem('selected_model')) {
  defaultModel = localStorage.getItem('selected_model');
}
document.addEventListener('DOMContentLoaded', function() {
  var select = document.getElementById('model-select');
  if (select) {
    select.value = defaultModel;
  }
});
</script>
<script src="/static/session.js?v=8"></script>
<script src="/static/modules/utils.js?v=1"></script>
<script src="/static/modules/widgets/core.js?v=1"></script>
<script src="/static/modules/widgets/ui-helpers.js?v=1"></script>
<script src="/static/modules/widgets/iframe-builder.js?v=1"></script>
<script src="/static/modules/widgets/toolbar-core.js?v=1"></script>
<script src="/static/modules/widgets/toolbar-editor.js?v=1"></script>
<script src="/static/modules/widgets/toolbar-history.js?v=1"></script>
<script src="/static/modules/widgets/toolbar.js?v=1"></script>
<script src="/static/modules/widgets/iframe.js?v=1"></script>
<script src="/static/modules/widgets/messaging.js?v=1"></script>
<script src="/static/modules/widgets/index.js?v=1"></script>
<script src="/static/modules/markdown-renderer.js?v=8"></script>
<script src="/static/modules/stream-dispatcher.js?v=6"></script>
<script src="/static/modules/reasoning-handler.js?v=1"></script>
<script src="/static/modules/content-handler.js?v=1"></script>
<script src="/static/modules/tool-call-renderer.js?v=1"></script>
<script src="/static/modules/stream-renderer.js?v=4"></script>
<script src="/static/modules/retry-handler.js?v=1"></script>
<script src="/static/modules/stream-error-handler.js?v=1"></script>
<script src="/static/debug.js?v=12"></script>
<script src="/static/modules/stream-orchestrator.js?v=1"></script>
<script src="/static/modules/chat-form.js?v=5"></script>
<script src="/static/chat-stream.js?v=27"></script>
</body></html>
