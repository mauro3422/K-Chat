<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos - TS Prototipo</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<script src="/static/htmx.min.js"></script>
<link rel="stylesheet" href="/static/style.css?v=13">
<script src="/static/marked.min.js?v=7"></script>
<script src="/static/purify.min.js?v=7"></script>
<script>
  (function() {
    var savedTheme = localStorage.getItem('selected_theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.classList.add('light-theme');
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('light-theme');
      });
    }
    var savedWidth = localStorage.getItem('sidebar_width');
    if (savedWidth) {
      document.write('<style>#sidebar { width: ' + savedWidth + 'px !important; }</style>');
    }
  })();
</script>
</head><body>
<canvas id="fx-canvas" class="fx-canvas"></canvas>
<div id="bg-effects" class="bg-effects"></div>
<div id="app" data-session-id="{{ session_id }}">
<aside id="sidebar">
  <div id="session-list"></div>
  <!-- Skills Section -->
  <div class="skills-sidebar-section">
    <div class="skills-header" id="skills-sidebar-header">
      <span class="skills-icon">💡</span>
      <h4>Skills</h4>
    </div>
    <div class="skills-list" id="skills-sidebar-list">
      <!-- Cargar dinámicamente -->
    </div>
  </div>
  <div class="sidebar-footer">
    <button id="btn-new-session" class="btn-new-glass">+ Nueva Sesión</button>
  </div>
</aside>
<div id="sidebar-gutter" class="sidebar-gutter"></div>
<main id="main">
  <div class="main-header">
    <div class="header-left">
      <button id="sidebar-toggle" class="header-btn" title="Mostrar/Ocultar panel">☰</button>
      <img src="/static/logo.png" alt="Kairos Logo" class="header-logo">
      <span class="header-brand">Kairos TS</span>
    </div>
    <div class="header-right">
      <span style="background:#00ff99;color:#000;padding:2px 6px;font-size:9px;font-weight:bold;border-radius:3px;box-shadow:0 0 8px rgba(0,255,153,0.4);line-height:1.4">TS</span>
      <button id="notification-bell" class="header-btn" title="Notificaciones">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#ff3333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span id="notification-badge" class="notif-badge" style="display:none">0</span>
      </button>
      <button id="canvas-toggle" class="header-btn" title="Ver Lienzo">🎨</button>
      <button id="theme-toggle" class="header-btn" title="Cambiar tema">🌓</button>
      <span class="debug-toggle" id="debug-toggle">📊 Debug</span>
    </div>
  </div>
  <div id="messages"><div class="empty-state">Envia un mensaje para empezar</div></div>
  <form id="chat-form">
    <div class="chat-input-container">
      <textarea id="msg-input" placeholder="Escribe un mensaje..." autofocus rows="1" aria-label="Mensaje" aria-describedby="chat-form-instructions"></textarea>
      <span id="chat-form-instructions" style="display:none">Escribe un mensaje y presiona Enter para enviar</span>
      <div id="attach-preview" class="attach-preview"></div>
      <div class="chat-input-toolbar">
        <div class="toolbar-left">
          <div class="model-select-wrapper">
            <span class="robot-icon" title="Modelos">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="7" width="14" height="12" rx="3"/>
                <rect x="8" y="10" width="3" height="3" rx="1" fill="currentColor" stroke="none"/>
                <rect x="13" y="10" width="3" height="3" rx="1" fill="currentColor" stroke="none"/>
                <path d="M9 16 Q12 18 15 16"/>
                <line x1="12" y1="7" x2="12" y2="4"/>
                <line x1="9" y1="4" x2="15" y2="4"/>
                <line x1="9" y1="4" x2="8" y2="2"/>
                <line x1="15" y1="4" x2="16" y2="2"/>
                <line x1="5" y1="11" x2="3" y2="10"/>
                <line x1="5" y1="14" x2="3" y2="15"/>
                <line x1="19" y1="11" x2="21" y2="10"/>
                <line x1="19" y1="14" x2="21" y2="15"/>
              </svg>
            </span>
            <select id="model-select" class="model-select">
              {% for group_name, group_models in models.items() %}
                {% if group_models %}
                  {% set group_labels = {"go_premium": "🚀 GO Premium", "go_standard": "⚡ GO Standard", "go_economy": "💰 GO Económico", "free_ratelimited": "⚠️ Free (Rate Limited)", "zen": "🔵 Zen"} %}
                  <optgroup label="{{ group_labels.get(group_name, group_name) }}">
                    {% for m in group_models %}
                      <option value="{{ m.id }}" class="model-option-{{ m.tier }}" title="{{ m.label }}">{{ m.label }}</option>
                    {% endfor %}
                  </optgroup>
                {% endif %}
              {% endfor %}
            </select>
          </div>
          <input type="file" id="file-input" multiple accept="image/*,application/pdf,audio/*,*/*" style="display:none">
        </div>
        <div class="toolbar-right">
          <button type="button" id="attach-btn" class="attach-btn" title="Adjuntar archivos">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </button>
          <button type="button" id="asr-mic-btn" class="asr-mic-idle" title="Grabar voz (Speech-to-Text)">
            <svg class="mic-svg" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button type="button" id="chat-submit-btn" title="Enviar mensaje">
            <svg class="send-svg" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <span id="spinner" class="htmx-indicator"></span>
  </form>
  </main>
  <div id="canvas-gutter" class="canvas-gutter collapsed"></div>
  <div id="canvas-workspace" class="canvas-workspace collapsed">
    <div class="canvas-header">
      <div class="canvas-title-wrapper">
        <span class="canvas-icon">🎨</span>
        <h3>Lienzo</h3>
      </div>
      <button id="canvas-close" class="canvas-close" title="Ocultar Lienzo">&times;</button>
    </div>
    <div id="canvas-cards" class="canvas-cards-container"></div>
  </div>
<div id="debug-panel" class="debug-panel">
  <div class="debug-header">
    <h3>Debug</h3>
    <span class="debug-close" id="debug-close">&times;</span>
  </div>
  <div class="debug-tabs">
    <button type="button" class="debug-tab active" id="debug-tab-btn">Debug</button>
    <button type="button" class="debug-tab" id="logs-tab-btn">Logs</button>
  </div>
  <div id="debug-content" class="debug-body">Envia un mensaje para ver el debug</div>
  <div id="system-log-content" class="debug-body" style="display:none">Abre Logs para ver el sistema</div>
</div>
</div>
<script type="module" src="{{ frontend_entry }}?v=1"></script>
<script src="/static/model-availability.js"></script>
</body></html>
