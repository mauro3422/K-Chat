name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate operations scripts
        shell: bash
        run: |
          bash -n scripts/kairos-node.sh scripts/bootstrap-linux-remote-control.sh
          pwsh -NoProfile -Command '$errors = $null; [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "scripts/remote-kairos.ps1"), [ref]$null, [ref]$errors) > $null; if ($errors.Count) { $errors | Format-List; exit 1 }'

      - name: Run TS frontend tests
        run: npm run test:ts

      - name: Run JS frontend tests
        run: npm run test:js

      - name: Run Python smoke tests
        run: python -m pytest tests/unit/test_app_factory.py tests/unit/test_anti_regression.py tests/unit/test_web_logging.py -v

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check src/ web/ tests/

      - name: Type check with Pyright
        run: |
          pip install pyright
          pyright src/

      - name: Lint JS
        run: npx eslint web/static/**/*.js
