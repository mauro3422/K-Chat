  @keyframes blink{0%,100%{opacity:0.85}50%{opacity:0.05}}
  @keyframes tailPulse{0%,100%{opacity:0.8}50%{opacity:0.4}}
</style>
<defs>
  <filter id="g3"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="g4"><feGaussianBlur stdDeviation="8"/></filter>
  <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0c180c"/>
    <stop offset="100%" stop-color="#081208"/>
